<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inpaup - Ecossistema de Comunidades</title>
    <style>
        :root {
            var(--theme-gradient): linear-gradient(135deg, #A259FF, #FF66C4);
            --bg-color: #fcf9fb;
            --text-main: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .hero {
            background: linear-gradient(135deg, #A259FF, #FF66C4);
            color: white;
            padding: 80px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hero h1 {
            font-size: 4em;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 900;
        }
        .hero p {
            font-size: 1.4em;
            max-width: 600px;
            margin: 20px auto;
            opacity: 0.95;
            line-height: 1.5;
        }
        .links-container {
            background-color: white;
            padding: 40px 20px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
        .links-container a {
            display: inline-block;
            margin: 10px 20px;
            text-decoration: none;
            color: #A259FF;
            font-weight: bold;
            font-size: 1.1em;
            padding: 10px 20px;
            border: 2px solid #f0defa;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .links-container a:hover {
            background-color: #A259FF;
            color: white;
        }
        footer {
            padding: 20px;
            color: #888;
            font-size: 0.9em;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>INPAUP</h1>
        <p>A sua rede social focada em comunidades e empresas relevantes. Conecte-se, crie alianças e expanda o seu ecossistema.</p>
    </div>

    <div class="links-container">
        <a href="privacidade.html">Política de Privacidade</a>
        <a href="termos.html">Termos de Uso</a>
        <a href="ajuda.html">Centro de Ajuda</a>
    </div>

    <footer>
        &copy; 2026 Inpaup. Todos os direitos reservados.<br>
        Contactos: +244 922 725 904 | +244 935 034 867
    </footer>

</body>
</html>
